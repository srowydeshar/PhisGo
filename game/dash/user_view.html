<html>
    <head>
        <title>PhisGo</title>
        <link rel="stylesheet" href="user_view.css">
        <link rel="stylesheet" href="responsive.css">
    </head>

    <body>
        <header>
            <div class="logosec">
                <div class="logo">PhisGo</div>
                <img src="../../visuals/icons/logosec.png" class="icn menuicn" id="menuicn" alt="menu-icon">
            </div>
        </header>

        <div class="main-container">
            <div class="navcontainer">
                <nav class="nav">
                   <div class="nav-upper-options">
                        <div class="nav-option option1">
                            <img src="../../visuals/icons/dashboard.png" class="nav-img" alt="dashboard" />
                            <h3>Dashboard</h3>
                        </div>

                        <div class="nav-option option2">
                            <img src="../../visuals/icons/scores.png" class="nav-img" alt="scores" />
                            <h3>Scores</h3>
                        </div>
                            
                        <div class="nav-option option3">
                            <img src="../../visuals/icons/progress.png" class="nav-img" alt="progress" />
                            <h3>Progress</h3>
                        </div>

                        <div class="nav-option option4">
                            <img src="../../visuals/icons/threat_news.png" class="nav-img" alt="threat news" />
                            <h3>Threat News</h3>
                        </div>

                        <div class="nav-option option5">
                            <img src="../../visuals/icons/profile.png" class="nav-img" alt="profile" />
                            <h3>Profile</h3>
                        </div>
                            
                        <div class="nav-option logout">
                            <img src="../../visuals/icons/logout.png" class="nav-img" alt="logout" />
                            <h3>Logout</h3>
                        </div>
                    </div>
                </nav>
            </div>
                
        </div>
    </body>
</html>
