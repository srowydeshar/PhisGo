<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Security Alert</title>

    <link rel="stylesheet"
          href="/mission1.css">
</head>

<body>

    <div class="alert-container">

        <button class="close-btn"
                id="closeBtn">
            X
        </button>

        <div class="logo">
            <h2>Account Security Center</h2>
        </div>

        <div class="content">

            <h1>
                Security Alert 🛡️
            </h1>

            <p>
                We have detected unusual activity
                on your account from a new device.
            </p>

            <p>
                For your protection,
                access has been temporarily
                restricted.
            </p>

            <p>
                Please verify your identity
                within the next 24hrs.
            </p>

            <a
                href="#"
                class="verify-btn"
                id="verifyBtn">

                Verify Account

            </a>

            <div class="footer">
                Need help? Contact Support
            </div>

        </div>

    </div>

    <script src="/mission1.js"></script>

</body>

</html>
